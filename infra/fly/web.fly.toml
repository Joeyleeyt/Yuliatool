# Fly.io — Next.js web app (UI + REST/RPC + enqueue only; no heavy work here).
app = "yulia-video-web"
primary_region = "iad"

[build]
  dockerfile = "../docker/web.Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

# Secrets (set via `fly secrets set`): DATABASE_URL, SUPABASE_*, REDIS_URL,
# R2_*, OPENAI_API_KEY, DEEPGRAM_API_KEY, SIXTYNINE_LABS_*.
