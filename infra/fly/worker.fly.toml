# Fly.io — background worker (BullMQ consumers: transcription, AI, generation,
# downloads, rendering). Runs FFmpeg, so it needs CPU, memory, and disk.
app = "yulia-video-worker"
# Co-located with the Supabase Postgres (AWS eu-west-1 / Ireland) to avoid a
# cross-Atlantic hop on every query; Redis is provisioned in the same region.
primary_region = "lhr"

[build]
#  dockerfile = "../docker/worker.Dockerfile"
dockerfile = "../docker/worker.Dockerfile"
  # BUILD_DATE is surfaced by the worker at boot ("Worker version: ...").
  # This static value is a fallback; the deploy script overrides it with the
  # real deploy timestamp via:
  #   fly deploy --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
  [build.args]
    BUILD_DATE = "unknown"

[env]
  NODE_ENV = "production"
  # Default concurrency for queues WITHOUT a dedicated override (transcription,
  # script-analysis, prompt-generation dispatch, download-assets) — these don't
  # hit 69Labs, so this can run well above core count.
  WORKER_CONCURRENCY = "12"
  # VIDEO_GENERATION-only cap: this queue polls 69Labs' status endpoint every
  # GENERATION_POLL_INTERVAL_SEC per layer for the whole generation duration, not
  # just at submit. With 2 machines (min_machines_running below) the ACCOUNT-WIDE
  # concurrent load is ~2x this value, since 69Labs' rate limit is per-account,
  # not per-machine. 69Labs ALSO caps concurrent in-flight jobs directly (5
  # videos, 7 images, account-wide — see SixtyNineLabsClient's 403 handling),
  # which is the binding constraint: at 4 (8 scenes account-wide x up to 3 image
  # layers each) submit bursts ran 3x over the image cap. 2 keeps worst-case
  # video submits (4) under 5 and meaningfully thins the image burst — dial
  # further down if 403s persist, or up once confirmed the account tolerates more.
  VIDEO_GENERATION_CONCURRENCY = "2"
  # More parallel scene composites within a single render (see VM sizing below).
  # Keep in sync with the [[vm]] core count.
  RENDER_COMPOSITE_CONCURRENCY = "8"

# No [http_service]: the worker is not an HTTP app. It exposes a tiny health
# server on 8080 for Fly checks only.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  # Never auto-stop: workers must stay alive to drain queues and recover jobs.
  auto_stop_machines = "off"
  auto_start_machines = false
  # Two machines so two PROJECTS can render in parallel (rendering queue is
  # concurrency-1 per machine). Keep in sync with `count` under [[vm]] below.
  min_machines_running = 2

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

# Rendering is CPU + memory heavy; give it room. More cores directly shorten the
# single render tail (parallel scene composites, faster libx264 mux). Bumped
# from performance-4x -> performance-8x (4 -> 8 cores) so RENDER_COMPOSITE_
# CONCURRENCY=8 above doesn't oversubscribe; this roughly doubles single-render
# composite-phase throughput at 2x the per-machine cost. `count = 2` adds a
# second machine for cross-PROJECT throughput — the rendering queue is
# concurrency-1 per machine, so two machines render two different projects at
# once (it does NOT speed up a single render). Keep min_machines_running in sync.
[[vm]]
  size = "performance-8x"
  memory = "16gb"
  count = 2

# Ephemeral scratch disk for FFmpeg asset download + render staging. Each machine
# gets its OWN volume from this named source — Fly volumes are NOT shared between
# machines, so provision one per machine before deploying with count = 2:
#   fly volumes create yulia_render_scratch --region lhr --size 20 --count 2
[mounts]
  source = "yulia_render_scratch"
  destination = "/scratch"
