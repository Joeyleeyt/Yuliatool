# Supabase local dev configuration.
project_id = "yulia-video"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
# Private, invite-only tool: no public sign-up. Accounts are provisioned via
# `pnpm --filter @yulia/web seed:users` and gated by the app's email allowlist.
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false

[storage]
enabled = false  # binaries live in Cloudflare R2, not Supabase Storage
